name: EmailAI Auto-Analyze

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'main.py'

jobs:
  analyze:
    name: Cycle analyse IA
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Vérifier API accessible
        id: health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.EMAILAI_API_URL }}/health" --max-time 15 || echo "000")
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "401" ]; then
            echo "api_ok=true" >> $GITHUB_OUTPUT
            echo "API accessible (HTTP $STATUS)"
          else
            echo "api_ok=false" >> $GITHUB_OUTPUT
            echo "API non accessible (HTTP $STATUS) - Render endormi ?"
          fi

      - name: Réveiller Render si endormi
        if: steps.health.outputs.api_ok == 'false'
        run: |
          echo "Tentative de réveil..."
          curl -s "${{ secrets.EMAILAI_API_URL }}/health" --max-time 60 || true
          sleep 10

      - name: Lancer le cycle d'analyse
        if: steps.health.outputs.api_ok == 'true'
        run: |
          RESPONSE=$(curl -s -X POST \
            "${{ secrets.EMAILAI_API_URL }}/cron/run?max_emails=20&secret=${{ secrets.EMAILAI_CRON_SECRET }}" \
            -H "X-Cron-Secret: ${{ secrets.EMAILAI_CRON_SECRET }}" \
            --max-time 300 || echo '{"error":"timeout"}')
          echo "Réponse: $RESPONSE"
          CLASSIFIED=$(echo "$RESPONSE" | grep -o '"classified":[0-9]*' | grep -o '[0-9]*' || echo "?")
          ANALYZED=$(echo "$RESPONSE"  | grep -o '"analyzed":[0-9]*'   | grep -o '[0-9]*' || echo "?")
          DURATION=$(echo "$RESPONSE"  | grep -o '"duration_s":[0-9.]*' | grep -o '[0-9.]*' || echo "?")
          echo "Classifiés: $CLASSIFIED | Analysés: $ANALYZED | Durée: ${DURATION}s"
